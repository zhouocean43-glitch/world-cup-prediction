services:
  - type: web
    name: world-cup-prediction
    runtime: python
    plan: free
    buildCommand: python3 -m py_compile backend/*.py
    startCommand: python3 -m backend.server --host 0.0.0.0 --port $PORT
    envVars:
      - key: ODDS_API_KEY
        sync: false
      - key: ODDS_API_BOOKMAKERS
        value: draftkings,fanduel,betmgm,bet365,pinnacle,betfair
      - key: ODDS_API_SPORT_KEYS
        value: soccer_fifa_world_cup
      - key: ODDS_API_OUTRIGHT_SPORT_KEY
        value: soccer_fifa_world_cup_winner
      - key: THE_ODDS_API_CACHE_SECONDS
        value: 86400
      - key: ODDS_CACHE_SECONDS
        value: 1800
      - key: CHAMPION_ODDS_CACHE_SECONDS
        value: 86400
      - key: API_FOOTBALL_KEY
        sync: false
      - key: API_FOOTBALL_LEAGUE
        value: 1
      - key: API_FOOTBALL_SEASON
        value: 2026
      - key: API_FOOTBALL_CACHE_SECONDS
        value: 1800
      - key: API_FOOTBALL_ODDS_MAX_PAGES
        value: 3
